<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>specmate 知识管理平台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #06060e;
    color: #e2e8f0;
    min-height: 100vh;
    line-height: 1.5;
  }
  /* ── Nav ── */
  .nav {
    background: rgba(15, 15, 35, 0.9);
    border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .nav-brand {
    font-size: 1.15rem;
    font-weight: 700;
    color: #a5b4fc;
    white-space: nowrap;
    padding: 16px 0;
  }
  .nav-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .nav-tab {
    background: none;
    border: none;
    color: #94a3b8;
    padding: 16px 20px;
    cursor: pointer;
    font-size: 0.95rem;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: #c7d2fe; }
  .nav-tab.active {
    color: #818cf8;
    border-bottom-color: #818cf8;
  }
  /* ── Layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Cards ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: rgba(15, 15, 35, 0.6);
    border: 1px solid rgba(99, 102, 241, 0.15);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }
  .card-value {
    font-size: 2rem;
    font-weight: 700;
    color: #a5b4fc;
    line-height: 1.2;
  }
  .card-label {
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 6px;
  }

  /* ── Tables ── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid rgba(99, 102, 241, 0.12);
    border-radius: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  th {
    text-align: left;
    padding: 10px 14px;
    background: rgba(15, 15, 35, 0.8);
    color: #94a3b8;
    font-weight: 600;
    border-bottom: 1px solid rgba(99, 102, 241, 0.15);
    white-space: nowrap;
  }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(99, 102, 241, 0.06);
    vertical-align: top;
  }
  tr:hover td { background: rgba(99, 102, 241, 0.06); }
  .clickable { cursor: pointer; color: #a5b4fc; }
  .clickable:hover { text-decoration: underline; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-resolved { background: rgba(34, 197, 94, 0.18); color: #4ade80; }
  .badge-unresolved { background: rgba(239, 68, 68, 0.18); color: #f87171; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(99, 102, 241, 0.3);
    background: rgba(99, 102, 241, 0.12);
    color: #a5b4fc;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .btn:hover { background: rgba(99, 102, 241, 0.22); }
  .btn-danger { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12); color: #f87171; }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.22); }
  .btn-sm { padding: 3px 10px; font-size: 0.78rem; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters select, .filters input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(99, 102, 241, 0.25);
    background: rgba(15, 15, 35, 0.8);
    color: #e2e8f0;
    font-size: 0.85rem;
  }
  .filters select:focus, .filters input:focus {
    outline: none;
    border-color: #818cf8;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    font-size: 0.85rem;
    color: #94a3b8;
  }

  /* ── Section header ── */
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #c7d2fe;
    margin-bottom: 14px;
  }

  /* ── Detail row ── */
  .detail-row {
    display: none;
    background: rgba(15, 15, 35, 0.5);
    border-bottom: 1px solid rgba(99, 102, 241, 0.1);
  }
  .detail-row.open { display: table-row; }
  .detail-content { padding: 14px 14px 14px 24px; }
  .detail-label { font-weight: 600; color: #818cf8; font-size: 0.82rem; }
  .detail-text { margin-top: 4px; margin-bottom: 10px; color: #cbd5e1; font-size: 0.88rem; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6, 6, 14, 0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #0f0f23;
    border: 1px solid rgba(99, 102, 241, 0.25);
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 { color: #a5b4fc; margin-bottom: 16px; }
  .modal label {
    display: block;
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 4px;
    margin-top: 10px;
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid rgba(99, 102, 241, 0.25);
    background: rgba(15, 15, 35, 0.8);
    color: #e2e8f0;
    font-size: 0.88rem;
    font-family: inherit;
  }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    justify-content: flex-end;
  }

  /* ── Import zone ── */
  .import-zone {
    border: 2px dashed rgba(99, 102, 241, 0.25);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    color: #64748b;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .import-zone:hover {
    border-color: #818cf8;
    color: #94a3b8;
  }
  .import-zone input { display: none; }

  /* ── Preview ── */
  .preview {
    margin-top: 16px;
    padding: 16px;
    background: rgba(15, 15, 35, 0.6);
    border-radius: 8px;
    font-size: 0.88rem;
  }
  .preview code {
    display: block;
    margin-top: 8px;
    color: #a5b4fc;
    font-size: 0.82rem;
  }

  /* ── Misc ── */
  .empty { text-align: center; color: #64748b; padding: 40px; }
  .error-msg { color: #f87171; margin: 12px 0; }
  .success-msg { color: #4ade80; margin: 12px 0; }
  .loading { color: #64748b; padding: 20px; text-align: center; }
  .truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.82rem; }

  @media (max-width: 768px) {
    .nav { padding: 0 12px; gap: 16px; }
    .nav-tab { padding: 14px 12px; font-size: 0.82rem; }
    .main { padding: 16px; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .filters { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">specmate 知识管理平台</div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="overview">概览</button>
    <button class="nav-tab" data-tab="errors">错误知识库</button>
    <button class="nav-tab" data-tab="captures">Capture 记录</button>
    <button class="nav-tab" data-tab="sessions">Session 历史</button>
    <button class="nav-tab" data-tab="io">导入导出</button>
  </div>
</nav>

<main class="main">

  <!-- ═══ Tab 1: 概览 ═══ -->
  <section class="tab-panel active" id="tab-overview">
    <div class="card-grid" id="summaryCards"></div>
    <h3 class="section-title">最新 Capture 记录</h3>
    <div class="table-wrap" id="recentTable"></div>
  </section>

  <!-- ═══ Tab 2: 错误知识库 ═══ -->
  <section class="tab-panel" id="tab-errors">
    <div class="table-wrap" id="errorsTable"></div>
  </section>

  <!-- ═══ Tab 3: Capture 记录 ═══ -->
  <section class="tab-panel" id="tab-captures">
    <div class="filters">
      <select id="captureStatusFilter">
        <option value="">全部状态</option>
        <option value="unresolved">unresolved</option>
        <option value="resolved">resolved</option>
      </select>
      <input type="text" id="captureCodeFilter" placeholder="错误码过滤..." style="width:160px;">
      <button class="btn btn-sm" id="captureFilterBtn">筛选</button>
    </div>
    <div class="table-wrap" id="capturesTable"></div>
    <div class="pagination" id="capturesPagination"></div>
  </section>

  <!-- ═══ Tab 4: Session 历史 ═══ -->
  <section class="tab-panel" id="tab-sessions">
    <div class="table-wrap" id="sessionsTable"></div>
  </section>

  <!-- ═══ Tab 5: 导入导出 ═══ -->
  <section class="tab-panel" id="tab-io">
    <h3 class="section-title">导出知识库</h3>
    <p style="color:#94a3b8; margin-bottom:14px;">下载完整的错误知识和 capture 记录为 JSON 文件。</p>
    <button class="btn" id="exportBtn">导出 JSON</button>

    <h3 class="section-title" style="margin-top:32px;">导入知识库</h3>
    <p style="color:#94a3b8; margin-bottom:14px;">从之前导出的 JSON 文件导入知识条目和 capture 记录。</p>
    <label class="import-zone" id="importZone">
      <div>点击选择文件 或 拖拽到此处</div>
      <div style="font-size:0.78rem;margin-top:4px;">支持 .json 文件</div>
      <input type="file" id="importFile" accept=".json">
    </label>
    <div id="importPreview"></div>
    <div id="importResult"></div>
  </section>

</main>

<!-- ═══ Edit Modal ═══ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editModalTitle">编辑错误知识条目</h3>
    <label>Code</label>
    <input type="text" id="editCode" readonly style="opacity:0.6;">
    <label>Title</label>
    <input type="text" id="editTitle">
    <label>Keywords</label>
    <input type="text" id="editKeywords">
    <label>Phenomena</label>
    <textarea id="editPhenomena"></textarea>
    <label>Cause</label>
    <textarea id="editCause"></textarea>
    <label>Solution</label>
    <textarea id="editSolution"></textarea>
    <label>Rules</label>
    <textarea id="editRules"></textarea>
    <div class="modal-actions">
      <button class="btn" id="editCancel">取消</button>
      <button class="btn" id="editSave">保存</button>
    </div>
  </div>
</div>

<script>
  // ── Tab switching ──
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const target = document.getElementById('tab-' + t.dataset.tab);
      if (target) target.classList.add('active');
      if (t.dataset.tab === 'overview') loadOverview();
      else if (t.dataset.tab === 'errors') loadErrors();
      else if (t.dataset.tab === 'captures') loadCaptures();
      else if (t.dataset.tab === 'sessions') loadSessions();
    });
  });

  // ── Helpers ──
  const api = async (url, opts = {}) => {
    const res = await fetch(url, opts);
    if (opts.raw) return res;
    return res.json();
  };

  const fmtTime = (ts) => {
    if (!ts) return '-';
    try { return new Date(ts).toLocaleString('zh-CN'); } catch (_) { return ts; }
  };

  const trunc = (s, n = 50) => s ? (s.length > n ? s.slice(0, n) + '...' : s) : '-';

  // ── Tab 1: 概览 ──
  async function loadOverview() {
    // Summary cards
    const cards = document.getElementById('summaryCards');
    cards.innerHTML = '<div class="loading">加载中...</div>';
    try {
      const s = await api('/api/summary');
      cards.innerHTML = [
        { v: s.totalSessions, l: '总 Session' },
        { v: s.activeSessions, l: '活跃 Session' },
        { v: s.totalCaptures, l: '总 Capture' },
        { v: s.distinctErrorCodes, l: '不同错误码' },
        { v: s.resolvedCaptures, l: '已解决' },
        { v: s.knowledgeEntries, l: '知识条目' },
      ].map(x => `<div class="card"><div class="card-value">${x.v}</div><div class="card-label">${x.l}</div></div>`).join('');
    } catch (e) {
      cards.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
    }

    // Recent captures table
    const table = document.getElementById('recentTable');
    table.innerHTML = '<div class="loading">加载中...</div>';
    try {
      const c = await api('/api/captures?pageSize=10');
      if (!c.items || c.items.length === 0) {
        table.innerHTML = '<div class="empty">暂无 capture 记录</div>';
        return;
      }
      table.innerHTML = `<table>
        <thead><tr><th>ID</th><th>Code</th><th>File</th><th>Timestamp</th><th>Status</th><th>Repeat</th></tr></thead>
        <tbody>${c.items.map(r => `<tr>
          <td>${r.id}</td>
          <td class="mono">${r.code}</td>
          <td class="truncate" style="max-width:220px;" title="${r.file||''}">${r.file||'-'}</td>
          <td>${fmtTime(r.timestamp)}</td>
          <td><span class="badge ${r.status==='resolved'?'badge-resolved':'badge-unresolved'}">${r.status}</span></td>
          <td>${r.repeat_count||1}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    } catch (e) {
      table.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
    }
  }

  // ── Tab 2: 错误知识库 ──
  async function loadErrors() {
    const table = document.getElementById('errorsTable');
    table.innerHTML = '<div class="loading">加载中...</div>';
    try {
      const errors = await api('/api/errors');
      if (!errors || errors.length === 0) {
        table.innerHTML = '<div class="empty">暂无知识条目</div>';
        return;
      }
      let html = `<table>
        <thead><tr><th>Code</th><th>Title</th><th>Keywords</th><th>Count</th><th>操作</th></tr></thead><tbody>`;
      errors.forEach((e, idx) => {
        html += `<tr class="clickable" data-err-idx="${idx}" data-code="${e.code}">
          <td class="mono">${e.code}</td>
          <td>${e.title}</td>
          <td>${e.keywords||'-'}</td>
          <td>${e.count||0}</td>
          <td>
            <button class="btn btn-sm edit-btn" data-code="${e.code}">编辑</button>
            <button class="btn btn-sm btn-danger del-btn" data-code="${e.code}">删除</button>
          </td>
        </tr>
        <tr class="detail-row" id="detail-${idx}">
          <td colspan="5"><div class="detail-content" id="detail-content-${idx}"></div></td>
        </tr>`;
      });
      html += '</tbody></table>';
      table.innerHTML = html;

      // Click row to expand
      table.querySelectorAll('tr.clickable').forEach(row => {
        row.addEventListener('click', async (ev) => {
          if (ev.target.closest('button')) return; // don't toggle on button clicks
          const idx = row.dataset.errIdx;
          const detail = document.getElementById('detail-' + idx);
          const content = document.getElementById('detail-content-' + idx);
          if (detail.classList.contains('open')) {
            detail.classList.remove('open');
            return;
          }
          // Close all others
          table.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
          detail.classList.add('open');
          if (content.dataset.loaded) return;
          content.innerHTML = '<span class="loading">加载详情...</span>';
          try {
            const d = await api('/api/errors/' + row.dataset.code);
            content.innerHTML =
              '<div class="detail-label">现象 (Phenomena)</div><div class="detail-text">' + (d.error.phenomena||'-') + '</div>' +
              '<div class="detail-label">原因 (Cause)</div><div class="detail-text">' + (d.error.cause||'-') + '</div>' +
              '<div class="detail-label">解决方案 (Solution)</div><div class="detail-text">' + (d.error.solution||'-') + '</div>' +
              (d.error.rules ? '<div class="detail-label">规则 (Rules)</div><div class="detail-text">' + d.error.rules + '</div>' : '');
            content.dataset.loaded = '1';
          } catch (e) {
            content.innerHTML = '<div class="error-msg">加载失败</div>';
          }
        });
      });

      // Edit buttons
      table.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          openEditModal(btn.dataset.code);
        });
      });

      // Delete buttons
      table.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          if (!confirm('确定删除错误知识条目 ' + btn.dataset.code + ' 吗？此操作不可撤销。')) return;
          try {
            await api('/api/errors/' + btn.dataset.code, { method: 'DELETE' });
            loadErrors();
          } catch (e) {
            alert('删除失败: ' + e.message);
          }
        });
      });
    } catch (e) {
      table.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
    }
  }

  // ── Tab 3: Capture 记录 ──
  let capturesPage = 1;
  async function loadCaptures(page = 1) {
    capturesPage = page;
    const table = document.getElementById('capturesTable');
    const pagination = document.getElementById('capturesPagination');
    table.innerHTML = '<div class="loading">加载中...</div>';

    const status = document.getElementById('captureStatusFilter').value;
    const code = document.getElementById('captureCodeFilter').value.trim();
    const params = new URLSearchParams({ page, pageSize: 20 });
    if (status) params.set('status', status);
    if (code) params.set('code', code);

    try {
      const c = await api('/api/captures?' + params.toString());
      if (!c.items || c.items.length === 0) {
        table.innerHTML = '<div class="empty">暂无匹配记录</div>';
        pagination.innerHTML = '';
        return;
      }
      table.innerHTML = `<table>
        <thead><tr><th>ID</th><th>Code</th><th>File</th><th>Timestamp</th><th>Status</th><th>Repeat</th><th>操作</th></tr></thead>
        <tbody>${c.items.map(r => `<tr>
          <td>${r.id}</td>
          <td class="mono">${r.code}</td>
          <td class="truncate" style="max-width:200px;" title="${r.file||''}">${r.file||'-'}</td>
          <td>${fmtTime(r.timestamp)}</td>
          <td><span class="badge ${r.status==='resolved'?'badge-resolved':'badge-unresolved'}">${r.status}</span></td>
          <td>${r.repeat_count||1}</td>
          <td><button class="btn btn-sm btn-danger cap-del-btn" data-id="${r.id}">删除</button></td>
        </tr>`).join('')}</tbody>
      </table>`;

      // Pagination
      const totalPages = Math.ceil(c.total / c.pageSize);
      pagination.innerHTML = `
        <span>共 ${c.total} 条，第 ${c.page} / ${totalPages} 页</span>
        <button class="btn btn-sm" ${c.page <= 1 ? 'disabled' : ''} onclick="loadCaptures(${c.page - 1})">上一页</button>
        <button class="btn btn-sm" ${c.page >= totalPages ? 'disabled' : ''} onclick="loadCaptures(${c.page + 1})">下一页</button>
      `;

      // Delete buttons
      table.querySelectorAll('.cap-del-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('确定删除该 capture 记录吗？')) return;
          try {
            await api('/api/captures/' + btn.dataset.id, { method: 'DELETE' });
            loadCaptures(capturesPage);
          } catch (e) {
            alert('删除失败: ' + e.message);
          }
        });
      });
    } catch (e) {
      table.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
      pagination.innerHTML = '';
    }
  }

  document.getElementById('captureFilterBtn').addEventListener('click', () => loadCaptures(1));

  // ── Tab 4: Session 历史 ──
  async function loadSessions() {
    const table = document.getElementById('sessionsTable');
    table.innerHTML = '<div class="loading">加载中...</div>';
    try {
      const sessions = await api('/api/sessions');
      if (!sessions || sessions.length === 0) {
        table.innerHTML = '<div class="empty">暂无 session 记录</div>';
        return;
      }
      table.innerHTML = `<table>
        <thead><tr><th>ID</th><th>Task Name</th><th>Started</th><th>Ended</th><th>Compile Attempts</th><th>Failures</th><th>Phase</th></tr></thead>
        <tbody>${sessions.map(s => `<tr>
          <td class="mono truncate" style="max-width:160px;" title="${s.id}">${s.id}</td>
          <td>${s.task_name||'-'}</td>
          <td>${fmtTime(s.started_at)}</td>
          <td>${fmtTime(s.ended_at)}</td>
          <td>${s.compile_attempts||0}</td>
          <td>${s.compile_failures||0}</td>
          <td>${s.phase||'-'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    } catch (e) {
      table.innerHTML = '<div class="error-msg">加载失败: ' + e.message + '</div>';
    }
  }

  // ── Edit Modal ──
  const editModal = document.getElementById('editModal');

  async function openEditModal(code) {
    document.getElementById('editModalTitle').textContent = '编辑: ' + code;
    document.getElementById('editCode').value = code;
    try {
      const d = await api('/api/errors/' + code);
      const e = d.error;
      document.getElementById('editTitle').value = e.title || '';
      document.getElementById('editKeywords').value = e.keywords || '';
      document.getElementById('editPhenomena').value = e.phenomena || '';
      document.getElementById('editCause').value = e.cause || '';
      document.getElementById('editSolution').value = e.solution || '';
      document.getElementById('editRules').value = e.rules || '';
    } catch (e) {
      alert('加载失败: ' + e.message);
      return;
    }
    editModal.classList.add('open');
  }

  document.getElementById('editCancel').addEventListener('click', () => {
    editModal.classList.remove('open');
  });

  document.getElementById('editSave').addEventListener('click', async () => {
    const code = document.getElementById('editCode').value;
    const fields = {
      title: document.getElementById('editTitle').value,
      keywords: document.getElementById('editKeywords').value,
      phenomena: document.getElementById('editPhenomena').value,
      cause: document.getElementById('editCause').value,
      solution: document.getElementById('editSolution').value,
      rules: document.getElementById('editRules').value,
    };
    try {
      await api('/api/errors/' + code, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(fields),
      });
      editModal.classList.remove('open');
      loadErrors();
    } catch (e) {
      alert('保存失败: ' + e.message);
    }
  });

  editModal.addEventListener('click', (ev) => {
    if (ev.target === editModal) editModal.classList.remove('open');
  });

  // ── Tab 5: Import/Export ──
  document.getElementById('exportBtn').addEventListener('click', async () => {
    try {
      const res = await fetch('/api/export');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'specmate-knowledge.json';
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('导出失败: ' + e.message);
    }
  });

  const importFile = document.getElementById('importFile');
  const importZone = document.getElementById('importZone');
  const importPreview = document.getElementById('importPreview');
  const importResult = document.getElementById('importResult');

  importZone.addEventListener('click', () => importFile.click());
  importZone.addEventListener('dragover', (ev) => { ev.preventDefault(); importZone.style.borderColor = '#818cf8'; });
  importZone.addEventListener('dragleave', () => { importZone.style.borderColor = ''; });
  importZone.addEventListener('drop', (ev) => {
    ev.preventDefault();
    importZone.style.borderColor = '';
    const file = ev.dataTransfer.files[0];
    if (file) handleImportFile(file);
  });

  importFile.addEventListener('change', () => {
    const file = importFile.files[0];
    if (file) handleImportFile(file);
  });

  let pendingImportData = null;
  function handleImportFile(file) {
    importResult.innerHTML = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !data.errors || !data.captures) {
          importPreview.innerHTML = '<div class="error-msg">无效的导出文件格式（缺少 version、errors 或 captures）</div>';
          return;
        }
        pendingImportData = data;
        importPreview.innerHTML = `<div class="preview">
          <strong>预览</strong>
          <p>版本: <code>${data.version}</code></p>
          <p>导出时间: <code>${data.exportedAt||'未知'}</code></p>
          <p>错误知识条目: <strong>${data.errors.length}</strong> 条</p>
          <p>Capture 记录: <strong>${data.captures.length}</strong> 条</p>
          <button class="btn" id="confirmImport" style="margin-top:12px;">确认导入</button>
        </div>`;

        document.getElementById('confirmImport').addEventListener('click', async () => {
          importResult.innerHTML = '<div class="loading">导入中...</div>';
          try {
            const result = await api('/api/import', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(pendingImportData),
            });
            importResult.innerHTML = '<div class="success-msg">导入成功！错误条目: ' + result.errorsImported + '，Capture: ' + result.capturesImported + '</div>';
            pendingImportData = null;
            importPreview.innerHTML = '';
          } catch (e) {
            importResult.innerHTML = '<div class="error-msg">导入失败: ' + e.message + '</div>';
          }
        });
      } catch (e) {
        importPreview.innerHTML = '<div class="error-msg">JSON 解析失败: ' + e.message + '</div>';
      }
    };
    reader.readAsText(file);
  }

  // ── Init ──
  loadOverview();
</script>
</body>
</html>
